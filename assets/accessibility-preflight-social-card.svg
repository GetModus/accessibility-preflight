<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Accessibility Preflight social card</title>
  <desc id="desc">A social banner for Accessibility Preflight describing it as an iOS-first accessibility preflight tool for Apple app teams.</desc>
  <rect width="1280" height="640" fill="#081C1B"/>
  <circle cx="1148" cy="122" r="196" fill="#123D3B"/>
